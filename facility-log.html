<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>분원 시설관리대장</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
  :root{
    --navy:#1E3A66;
    --navy-dark:#132844;
    --gold:#A9790E;
    --gold-light:#C9962B;
    --bg:#F5F6F8;
    --card:#FFFFFF;
    --border:#E2E5EA;
    --text:#242832;
    --muted:#7A8090;
    --danger:#D64545;
    --danger-bg:#FDECEC;
    --ok:#2E9E5B;
    --wait:#E8A93C;
    --hold:#8B8F99;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:"Pretendard","Apple SD Gothic Neo",-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);}
  header{background:var(--navy);color:#fff;padding:18px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:20;}
  header h1{font-size:17px;margin:0;font-weight:800;letter-spacing:-.3px;}
  header .sub{font-size:11px;color:#B9C4D6;margin-top:2px;font-weight:400;}
  #cloud-dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:6px;vertical-align:middle;}
  #cloud-dot.ok{background:#34C759;}
  #cloud-dot.err{background:#FF3B30;}
  #cloud-dot.loading{background:#FF9500;animation:pulse .8s infinite;}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
  .cloud-status{font-size:11px;color:#B9C4D6;display:flex;align-items:center;}

  nav.tabs{display:flex;background:var(--navy-dark);position:sticky;top:58px;z-index:19;}
  nav.tabs button{flex:1;padding:12px 8px;background:none;border:none;color:#9FB0CC;font-size:14px;font-weight:700;cursor:pointer;border-bottom:3px solid transparent;}
  nav.tabs button.active{color:#fff;border-bottom-color:var(--gold);}

  main{max-width:960px;margin:0 auto;padding:16px;}
  .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:14px;}
  .card h2{font-size:14px;margin:0 0 12px;font-weight:800;color:var(--navy);}
  label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin:10px 0 4px;}
  select,input[type=text],input[type=date],textarea,input[type=password],input[type=number]{
    width:100%;padding:9px 10px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;background:#fff;color:var(--text);
  }
  textarea{resize:vertical;min-height:64px;}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  button.primary{background:var(--gold);color:#fff;border:none;padding:11px 18px;border-radius:8px;font-weight:800;font-size:14px;cursor:pointer;margin-top:14px;}
  button.primary:disabled{opacity:.5;}
  button.secondary{background:#fff;color:var(--navy);border:1px solid var(--border);padding:8px 14px;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;}
  button.small{padding:6px 10px;font-size:12px;border-radius:6px;}
  .file-row{display:flex;align-items:center;gap:8px;margin-top:4px;}
  .file-row img{height:40px;border-radius:6px;border:1px solid var(--border);}

  .req-card{border:1px solid var(--border);border-radius:10px;padding:12px;margin-bottom:10px;background:#fff;}
  .req-card.overdue{border-color:var(--danger);background:var(--danger-bg);}
  .req-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .req-cat{font-size:11px;font-weight:800;color:var(--navy);background:#EDF1F8;padding:3px 8px;border-radius:20px;}
  .req-loc{font-size:12px;color:var(--muted);margin-top:4px;}
  .req-body{font-size:13.5px;margin:8px 0;line-height:1.5;}
  .req-meta{font-size:11px;color:var(--muted);display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px;}
  .badge{font-size:11px;font-weight:800;padding:3px 9px;border-radius:20px;color:#fff;white-space:nowrap;}
  .badge.접수{background:var(--wait);}
  .badge.처리중{background:#3E7BD6;}
  .badge.보류{background:var(--hold);}
  .badge.완료{background:var(--ok);}
  .req-photo{margin-top:8px;}
  .req-photo img{max-width:120px;border-radius:8px;border:1px solid var(--border);cursor:pointer;}
  .handle-box{margin-top:8px;padding-top:8px;border-top:1px dashed var(--border);font-size:12.5px;color:var(--text);}
  .handle-box b{color:var(--navy);}

  .filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
  .filters select,.filters input{width:auto;flex:1;min-width:110px;}

  .stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
  .stat{background:#fff;border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center;}
  .stat .num{font-size:20px;font-weight:800;color:var(--navy);}
  .stat .lab{font-size:11px;color:var(--muted);margin-top:2px;}
  .stat.warn .num{color:var(--danger);}

  .login-box{max-width:320px;margin:60px auto;text-align:center;}
  .empty{text-align:center;color:var(--muted);font-size:13px;padding:30px 0;}

  .modal-bg{position:fixed;inset:0;background:rgba(20,25,35,.5);display:none;align-items:center;justify-content:center;z-index:50;padding:16px;}
  .modal-bg.show{display:flex;}
  .modal{background:#fff;border-radius:14px;padding:20px;max-width:440px;width:100%;max-height:88vh;overflow-y:auto;}
  .modal h3{margin:0 0 12px;font-size:15px;color:var(--navy);}
  .modal-actions{display:flex;gap:8px;margin-top:16px;}
  .modal-actions button{flex:1;}

  @media (max-width:520px){
    .stat-grid{grid-template-columns:repeat(2,1fr);}
    .row2{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>바론네트웍스 시설관리대장</h1>
    <div class="sub">분원 요청 · 총무팀 처리 기록</div>
  </div>
  <div class="cloud-status"><span id="cloud-dot"></span><span id="cloud-text">연결 중</span></div>
</header>

<nav class="tabs">
  <button id="tabBranchBtn" class="active" onclick="switchTab('branch')">분원 등록/조회</button>
  <button id="tabAdminBtn" onclick="switchTab('admin')">총무팀 관리</button>
</nav>

<main>

  <!-- ===== 분원 뷰 ===== -->
  <section id="branchView">
    <div class="card">
      <h2>내 지점 선택</h2>
      <select id="myBranch" onchange="onBranchChange()"></select>
    </div>

    <div class="card">
      <h2>새 요청 등록</h2>
      <form id="registerForm" onsubmit="submitRequest(event)">
        <label>작성일자</label>
        <input type="date" id="f_date" required>

        <label>점검항목</label>
        <select id="f_category" required></select>

        <label>위치</label>
        <input type="text" id="f_location" placeholder="예: 3층 로비, 2강의실 등">

        <label>요청 내용</label>
        <textarea id="f_content" required placeholder="어떤 문제가 있는지 구체적으로 적어주세요"></textarea>

        <label>요청자</label>
        <input type="text" id="f_requester" required placeholder="이름">

        <label>사진 첨부 (선택)</label>
        <input type="file" id="f_photo" accept="image/*">
        <div class="file-row" id="f_photo_preview"></div>

        <button type="submit" class="primary" id="submitBtn">요청 등록</button>
      </form>
    </div>

    <div class="card">
      <h2>요청 내역 조회</h2>
      <div class="filters">
        <select id="viewBranchFilter" onchange="renderMyRequests()">
          <option value="">전체 지점</option>
        </select>
        <select id="myStatusFilter" onchange="renderMyRequests()">
          <option value="">전체 상태</option>
        </select>
        <select id="periodFilter" onchange="onPeriodChange()">
          <option value="all">전체 기간</option>
          <option value="month">이번 달</option>
          <option value="last1m">최근 1개월</option>
          <option value="last3m">최근 3개월</option>
          <option value="year">최근 1년</option>
          <option value="custom">기간 직접 설정</option>
        </select>
      </div>
      <div class="filters" id="customPeriodRow" style="display:none">
        <input type="date" id="periodFrom" onchange="renderMyRequests()">
        <input type="date" id="periodTo" onchange="renderMyRequests()">
      </div>
      <div id="myRequestsList"><div class="empty">불러오는 중...</div></div>
    </div>
  </section>

  <!-- ===== 총무팀 뷰 ===== -->
  <section id="adminView" style="display:none">
    <div id="loginBox" class="login-box">
      <div class="card">
        <h2>총무팀 비밀번호</h2>
        <input type="password" id="adminPw" placeholder="비밀번호 입력">
        <label style="display:flex;align-items:center;gap:6px;font-weight:400;margin-top:6px;">
          <input type="checkbox" id="pwShowToggle" style="width:auto" onchange="document.getElementById('adminPw').type=this.checked?'text':'password'"> 비밀번호 보이기
        </label>
        <button class="primary" style="width:100%" onclick="tryAdminLogin()">입장</button>
        <div id="loginErr" style="color:var(--danger);font-size:12px;margin-top:8px;"></div>
      </div>
    </div>

    <div id="adminPanel" style="display:none">
      <div class="stat-grid" id="statGrid"></div>

      <div class="card">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
          <h2 style="margin:0">전체 요청 목록</h2>
          <button class="secondary small" onclick="exportExcel()">엑셀 내보내기</button>
        </div>
        <div class="filters">
          <select id="af_branch" onchange="renderAdminList()"><option value="">전체 지점</option></select>
          <select id="af_status" onchange="renderAdminList()"><option value="">전체 상태</option></select>
          <select id="af_category" onchange="renderAdminList()"><option value="">전체 항목</option></select>
          <input type="date" id="af_from" onchange="renderAdminList()">
          <input type="date" id="af_to" onchange="renderAdminList()">
        </div>
        <div id="adminList"><div class="empty">불러오는 중...</div></div>
      </div>
    </div>
  </section>

</main>

<!-- 처리 입력 모달 -->
<div class="modal-bg" id="editModalBg">
  <div class="modal">
    <h3>요청 처리</h3>
    <div id="editModalMeta" style="font-size:12.5px;color:var(--muted);margin-bottom:10px;"></div>
    <label>상태</label>
    <select id="e_status"></select>
    <label>처리 내용</label>
    <textarea id="e_handle_content"></textarea>
    <label>처리일자</label>
    <input type="date" id="e_handled_date">
    <label>확인자</label>
    <input type="text" id="e_handler" placeholder="총무팀 담당자 이름">
    <div class="row2">
      <div><label>비용(원)</label><input type="number" id="e_cost" placeholder="0"></div>
      <div><label>소모물품/비고</label><input type="text" id="e_items"></div>
    </div>
    <div class="modal-actions">
      <button class="secondary" onclick="closeEditModal()">취소</button>
      <button class="primary" style="margin-top:0" onclick="saveEdit()">저장</button>
    </div>
  </div>
</div>

<!-- 사진 크게 보기 모달 -->
<div class="modal-bg" id="photoModalBg" onclick="this.classList.remove('show')">
  <img id="photoModalImg" src="" style="max-width:100%;max-height:85vh;border-radius:10px;">
</div>

<script>
/* ===================== 설정 ===================== */
const SUPABASE_URL = 'https://fauzcprystmkbvvxysdi.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZhdXpjcHJ5c3Rta2J2dnh5c2RpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4OTg0NDcsImV4cCI6MjA5ODQ3NDQ0N30.4B6Blhi_QEaf_fk465M2oLIytbE81ShTwPe-ZRU1-BQ';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// 총무팀 비밀번호 - 필요하면 이 값만 바꾸세요
const ADMIN_PASSWORD = '2026';

const BRANCHES = ['장안','서수원','수원','운정1','운정2','남동탄'];
const CATEGORIES = ['전기/조명','냉난방','누수/배관','도장/벽지/바닥','가구/집기','청소/위생','보안/출입','인터넷/통신','기타'];
const STATUSES = ['접수','처리중','보류','완료'];
const OVERDUE_DAYS = 3;
const PHOTO_BUCKET = 'facility-photos';

let allMyRequests = [];
let allAdminRequests = [];
let isAdmin = false;

/* ===================== 초기화 ===================== */
function fillSelect(sel, options, placeholder){
  sel.innerHTML = (placeholder ? `<option value="">${placeholder}</option>` : '') +
    options.map(o=>`<option value="${o}">${o}</option>`).join('');
}

window.addEventListener('DOMContentLoaded', ()=>{
  fillSelect(document.getElementById('myBranch'), BRANCHES);
  fillSelect(document.getElementById('f_category'), CATEGORIES);
  fillSelect(document.getElementById('myStatusFilter'), STATUSES, '전체 상태');
  fillSelect(document.getElementById('viewBranchFilter'), BRANCHES, '전체 지점');
  fillSelect(document.getElementById('af_branch'), BRANCHES, '전체 지점');
  fillSelect(document.getElementById('af_status'), STATUSES, '전체 상태');
  fillSelect(document.getElementById('af_category'), CATEGORIES, '전체 항목');
  fillSelect(document.getElementById('e_status'), STATUSES);

  document.getElementById('f_date').value = todayStr();

  document.getElementById('f_photo').addEventListener('change', (e)=>{
    const f = e.target.files[0];
    const box = document.getElementById('f_photo_preview');
    box.innerHTML = f ? `<img src="${URL.createObjectURL(f)}"><span style="font-size:12px;color:var(--muted)">${f.name}</span>` : '';
  });

  setCloud('loading','연결 중');
  loadMyRequests();
});

function todayStr(){ return new Date().toISOString().slice(0,10); }
function daysSince(dateStr){
  const d1 = new Date(dateStr); const d2 = new Date(todayStr());
  return Math.floor((d2-d1)/(1000*60*60*24));
}
function setCloud(state,text){
  document.getElementById('cloud-dot').className = state;
  document.getElementById('cloud-text').textContent = text;
}

/* ===================== 탭 전환 ===================== */
function switchTab(tab){
  document.getElementById('branchView').style.display = tab==='branch' ? 'block':'none';
  document.getElementById('adminView').style.display = tab==='admin' ? 'block':'none';
  document.getElementById('tabBranchBtn').classList.toggle('active', tab==='branch');
  document.getElementById('tabAdminBtn').classList.toggle('active', tab==='admin');
  if(tab==='admin' && isAdmin) loadAdminRequests();
}

function onBranchChange(){ /* 등록용 지점 선택 - 조회 필터와는 별개 */ }

function onPeriodChange(){
  const v = document.getElementById('periodFilter').value;
  document.getElementById('customPeriodRow').style.display = v==='custom' ? 'flex' : 'none';
  renderMyRequests();
}

function periodRange(){
  const v = document.getElementById('periodFilter').value;
  const today = new Date();
  const fmt = d => d.toISOString().slice(0,10);
  if(v==='month'){
    const from = new Date(today.getFullYear(), today.getMonth(), 1);
    return {from: fmt(from), to: todayStr()};
  }
  if(v==='last1m'){
    const from = new Date(today); from.setMonth(from.getMonth()-1);
    return {from: fmt(from), to: todayStr()};
  }
  if(v==='last3m'){
    const from = new Date(today); from.setMonth(from.getMonth()-3);
    return {from: fmt(from), to: todayStr()};
  }
  if(v==='year'){
    const from = new Date(today); from.setFullYear(from.getFullYear()-1);
    return {from: fmt(from), to: todayStr()};
  }
  if(v==='custom'){
    return {from: document.getElementById('periodFrom').value, to: document.getElementById('periodTo').value};
  }
  return {from:'', to:''};
}

/* ===================== 분원: 등록 ===================== */
async function uploadPhoto(file){
  const fileName = `${Date.now()}_${file.name.replace(/[^a-zA-Z0-9.]/g,'_')}`;
  const { error } = await sb.storage.from(PHOTO_BUCKET).upload(fileName, file);
  if(error) throw error;
  const { data } = sb.storage.from(PHOTO_BUCKET).getPublicUrl(fileName);
  return data.publicUrl;
}

async function submitRequest(e){
  e.preventDefault();
  const btn = document.getElementById('submitBtn');
  btn.disabled = true; btn.textContent = '등록 중...';
  try{
    const branch = document.getElementById('myBranch').value;
    if(!branch){ alert('지점을 먼저 선택해주세요.'); btn.disabled=false; btn.textContent='요청 등록'; return; }

    let photo_url = null;
    const file = document.getElementById('f_photo').files[0];
    if(file){ photo_url = await uploadPhoto(file); }

    const payload = {
      branch,
      created_date: document.getElementById('f_date').value,
      category: document.getElementById('f_category').value,
      location: document.getElementById('f_location').value,
      request_content: document.getElementById('f_content').value,
      requester: document.getElementById('f_requester').value,
      status: '접수',
      photo_url
    };
    const { error } = await sb.from('facility_log').insert(payload);
    if(error) throw error;

    setCloud('ok','저장됨');
    document.getElementById('registerForm').reset();
    document.getElementById('f_date').value = todayStr();
    document.getElementById('f_photo_preview').innerHTML='';
    loadMyRequests();
  }catch(err){
    console.error(err);
    setCloud('err','오류');
    alert('등록 중 오류가 발생했습니다: ' + (err.message||err));
  }finally{
    btn.disabled = false; btn.textContent = '요청 등록';
  }
}

/* ===================== 분원: 조회 ===================== */
async function loadMyRequests(){
  try{
    setCloud('loading','불러오는 중');
    const { data, error } = await sb.from('facility_log').select('*').order('created_date',{ascending:false}).order('id',{ascending:false});
    if(error) throw error;
    allMyRequests = data || [];
    setCloud('ok','연결됨');
    renderMyRequests();
  }catch(err){
    console.error(err);
    setCloud('err','연결 실패');
  }
}

function renderMyRequests(){
  const branch = document.getElementById('viewBranchFilter').value;
  const statusF = document.getElementById('myStatusFilter').value;
  const {from, to} = periodRange();
  const list = document.getElementById('myRequestsList');

  let rows = allMyRequests.slice();
  if(branch) rows = rows.filter(r=>r.branch===branch);
  if(statusF) rows = rows.filter(r=>r.status===statusF);
  if(from) rows = rows.filter(r=>r.created_date >= from);
  if(to) rows = rows.filter(r=>r.created_date <= to);

  if(!rows.length){ list.innerHTML = '<div class="empty">조건에 맞는 요청이 없습니다.</div>'; return; }
  list.innerHTML = rows.map(r=>reqCardHtml(r, !branch)).join('');
}

function reqCardHtml(r, showBranch){
  const overdue = (r.status==='접수'||r.status==='처리중') && daysSince(r.created_date) >= OVERDUE_DAYS;
  const handleBox = r.handle_content || r.handled_date || r.handler ? `
    <div class="handle-box">
      <div><b>처리내용</b> ${escapeHtml(r.handle_content||'-')}</div>
      <div><b>처리일자</b> ${r.handled_date||'-'} &nbsp; <b>확인자</b> ${escapeHtml(r.handler||'-')}</div>
      ${r.cost ? `<div><b>비용</b> ${Number(r.cost).toLocaleString()}원</div>`:''}
      ${r.items_note ? `<div><b>비고</b> ${escapeHtml(r.items_note)}</div>`:''}
    </div>` : '';
  return `
  <div class="req-card ${overdue?'overdue':''}">
    <div class="req-top">
      <div>
        <span class="req-cat">${r.category}</span>
        ${showBranch? `<span class="req-cat" style="background:#F3EBD9;color:#8A6200;">${r.branch}</span>`:''}
        <div class="req-loc">${escapeHtml(r.location||'')}</div>
      </div>
      <span class="badge ${r.status}">${r.status}${overdue?' ⚠':''}</span>
    </div>
    <div class="req-body">${escapeHtml(r.request_content)}</div>
    ${r.photo_url ? `<div class="req-photo"><img src="${r.photo_url}" onclick="showPhoto('${r.photo_url}')"></div>`:''}
    <div class="req-meta">
      <span>작성 ${r.created_date} · ${escapeHtml(r.requester||'')}</span>
    </div>
    ${handleBox}
  </div>`;
}

function escapeHtml(s){
  if(!s) return '';
  return s.replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function showPhoto(url){
  document.getElementById('photoModalImg').src = url;
  document.getElementById('photoModalBg').classList.add('show');
}

/* ===================== 총무팀: 로그인 ===================== */
function tryAdminLogin(){
  const pw = document.getElementById('adminPw').value.trim();
  if(pw === ADMIN_PASSWORD){
    isAdmin = true;
    document.getElementById('loginBox').style.display='none';
    document.getElementById('adminPanel').style.display='block';
    loadAdminRequests();
  }else{
    document.getElementById('loginErr').textContent = '비밀번호가 올바르지 않습니다.';
  }
}

/* ===================== 총무팀: 목록/대시보드 ===================== */
async function loadAdminRequests(){
  try{
    setCloud('loading','불러오는 중');
    const { data, error } = await sb.from('facility_log').select('*').order('created_date',{ascending:false}).order('id',{ascending:false});
    if(error) throw error;
    allAdminRequests = data || [];
    setCloud('ok','연결됨');
    renderStats();
    renderAdminList();
  }catch(err){
    console.error(err);
    setCloud('err','연결 실패');
  }
}

function renderStats(){
  const rows = allAdminRequests;
  const open = rows.filter(r=>r.status==='접수'||r.status==='처리중');
  const overdue = open.filter(r=>daysSince(r.created_date)>=OVERDUE_DAYS);
  const done = rows.filter(r=>r.status==='완료');
  const grid = document.getElementById('statGrid');
  grid.innerHTML = `
    <div class="stat"><div class="num">${rows.length}</div><div class="lab">전체 요청</div></div>
    <div class="stat"><div class="num">${open.length}</div><div class="lab">미처리(접수/처리중)</div></div>
    <div class="stat warn"><div class="num">${overdue.length}</div><div class="lab">3일 이상 지연</div></div>
    <div class="stat"><div class="num">${done.length}</div><div class="lab">완료</div></div>
  `;
}

function currentAdminFilters(){
  return {
    branch: document.getElementById('af_branch').value,
    status: document.getElementById('af_status').value,
    category: document.getElementById('af_category').value,
    from: document.getElementById('af_from').value,
    to: document.getElementById('af_to').value
  };
}

function filteredAdminRows(){
  const f = currentAdminFilters();
  return allAdminRequests.filter(r=>{
    if(f.branch && r.branch!==f.branch) return false;
    if(f.status && r.status!==f.status) return false;
    if(f.category && r.category!==f.category) return false;
    if(f.from && r.created_date < f.from) return false;
    if(f.to && r.created_date > f.to) return false;
    return true;
  });
}

function renderAdminList(){
  const rows = filteredAdminRows();
  const list = document.getElementById('adminList');
  if(!rows.length){ list.innerHTML = '<div class="empty">조건에 맞는 요청이 없습니다.</div>'; return; }
  list.innerHTML = rows.map(r=>{
    const overdue = (r.status==='접수'||r.status==='처리중') && daysSince(r.created_date) >= OVERDUE_DAYS;
    return `
    <div class="req-card ${overdue?'overdue':''}" onclick="openEditModal(${r.id})" style="cursor:pointer">
      <div class="req-top">
        <div>
          <span class="req-cat">${r.category}</span>
          <span class="req-cat" style="background:#F3EBD9;color:#8A6200;">${r.branch}</span>
          <div class="req-loc">${escapeHtml(r.location||'')}</div>
        </div>
        <span class="badge ${r.status}">${r.status}${overdue?' ⚠':''}</span>
      </div>
      <div class="req-body">${escapeHtml(r.request_content)}</div>
      ${r.photo_url ? `<div class="req-photo"><img src="${r.photo_url}" onclick="event.stopPropagation();showPhoto('${r.photo_url}')"></div>`:''}
      <div class="req-meta"><span>작성 ${r.created_date} · ${escapeHtml(r.requester||'')}</span><span>탭하여 처리 입력 ›</span></div>
    </div>`;
  }).join('');
}

/* ===================== 총무팀: 처리 입력 모달 ===================== */
let editingId = null;
function openEditModal(id){
  const r = allAdminRequests.find(x=>x.id===id);
  if(!r) return;
  editingId = id;
  document.getElementById('editModalMeta').textContent = `${r.branch} · ${r.category} · ${r.location||''} · ${r.created_date} 접수 (${escapeHtml(r.requester||'')})`;
  document.getElementById('e_status').value = r.status;
  document.getElementById('e_handle_content').value = r.handle_content || '';
  document.getElementById('e_handled_date').value = r.handled_date || '';
  document.getElementById('e_handler').value = r.handler || '';
  document.getElementById('e_cost').value = r.cost || '';
  document.getElementById('e_items').value = r.items_note || '';
  document.getElementById('editModalBg').classList.add('show');
}
function closeEditModal(){
  document.getElementById('editModalBg').classList.remove('show');
  editingId = null;
}
async function saveEdit(){
  if(!editingId) return;
  const status = document.getElementById('e_status').value;
  const handled_date = document.getElementById('e_handled_date').value || (status==='완료' ? todayStr() : null);
  const payload = {
    status,
    handle_content: document.getElementById('e_handle_content').value,
    handled_date,
    handler: document.getElementById('e_handler').value,
    cost: document.getElementById('e_cost').value ? Number(document.getElementById('e_cost').value) : null,
    items_note: document.getElementById('e_items').value
  };
  try{
    const { error } = await sb.from('facility_log').update(payload).eq('id', editingId);
    if(error) throw error;
    closeEditModal();
    loadAdminRequests();
  }catch(err){
    alert('저장 중 오류: ' + (err.message||err));
  }
}

/* ===================== 엑셀 내보내기 ===================== */
function exportExcel(){
  const rows = filteredAdminRows();
  if(!rows.length){ alert('내보낼 데이터가 없습니다.'); return; }
  const sheetRows = rows.map((r,i)=>({
    '번호': i+1,
    '지점': r.branch,
    '작성일자': r.created_date,
    '점검항목': r.category,
    '위치': r.location||'',
    '요청내용': r.request_content||'',
    '요청자': r.requester||'',
    '상태': r.status,
    '처리내용': r.handle_content||'',
    '처리일자': r.handled_date||'',
    '확인자': r.handler||'',
    '비용': r.cost||'',
    '소모물품/비고': r.items_note||''
  }));
  const ws = XLSX.utils.json_to_sheet(sheetRows);
  ws['!cols'] = [6,8,10,14,14,34,10,8,26,10,10,10,20].map(w=>({wch:w}));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, '시설관리대장');
  XLSX.writeFile(wb, `시설관리대장_${todayStr()}.xlsx`);
}
